apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: banka-2
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers (OWASP) — same kao FE source nginx.conf.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "no-referrer" always;

        # K8s liveness/readiness probe target.
        location = /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # NEMA /api proxy — Envoy Gateway HTTPRoute (route.yaml) radi sav
        # routing: /backend/* -> backend:8080, /trading-service/* -> trading-service:8082,
        # /notification-service/* -> notification-service:8083, / catch-all -> frontend.
        # Browser saljete API request-i direktno na Gateway domain (banka-2.radenkovic.rs)
        # sa odgovarajucim prefix-om.

        # SPA fallback — sve sto nije static fajl ide na index.html (React Router).
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: banka-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - image: ghcr.io/raf-si-2025/banka-2-frontend:latest
        name: banka-2-frontend
        ports:
        - name: http
          containerPort: 80
        env:
          # Runtime config (envsubst u docker-entrypoint.sh generise
          # /usr/share/nginx/html/config.js iz public/config.template.js).
          # Browser cita window._env_ pri load-u index.html-a pre main bundle-a —
          # promena ovih env vars + rollout restart = nova FE konfiguracija
          # bez ponovnog build-a image-a.
          # /api relativan — browser resolve na same origin (banka-2.radenkovic.rs/api/*),
          # Envoy Gateway HTTPRoute (route.yaml) path-em rute na backend/trading/notification.
          - name: API_URL
            value: /api
          - name: OUR_BANK_CODE
            value: RN-222
          - name: ENV
            value: production
        # Override default.conf sa ConfigMap-om — source nginx.conf u FE image-u
        # referencira `banka2_backend` i `banka2_gateway` upstream-e (Docker compose
        # imena) koji ne postoje u K8s. Mountamo svoju verziju sa K8s service imenima.
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: nginx-config
        configMap:
          name: frontend-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: banka-2
spec:
  selector:
    app: frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
