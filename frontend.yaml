apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: banka-2
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers (OWASP) — same kao FE source nginx.conf.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "no-referrer" always;

        # K8s liveness/readiness probe target.
        location = /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # /api/* → backend (K8s Service ime u banka-2 namespace-u).
        # Trading + notification service-i imaju svoje URL pre-fix-e — ako FE
        # Axios saljete `/api/orders`, ovo ce ga rute-ovati na backend. Ako
        # trading-service path-evi (`/orders`, `/portfolio`, `/funds`, ...)
        # treba direktan rute, dodaj posebne location blokove (banka-core
        # forward-uje na trading-service preko BankaCoreClient u BE).
        location /api/ {
            proxy_pass http://backend:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SSE/long-poll bez buffering za buduce stream endpoint-e.
            proxy_buffering off;
            proxy_read_timeout 600s;
            client_max_body_size 20m;
        }

        # SPA fallback — sve sto nije static fajl ide na index.html (React Router).
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: banka-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - image: ghcr.io/raf-si-2025/banka-2-frontend:latest
        name: banka-2-frontend
        ports:
        - name: http
          containerPort: 80
        env:
          # Runtime config (envsubst u docker-entrypoint.sh generise
          # /usr/share/nginx/html/config.js iz public/config.template.js).
          # Browser cita window._env_ pri load-u index.html-a pre main bundle-a —
          # promena ovih env vars + rollout restart = nova FE konfiguracija
          # bez ponovnog build-a image-a.
          - name: API_URL
            value: https://banka-2.radenkovic.rs
          - name: OUR_BANK_CODE
            value: RN-222
          - name: ENV
            value: production
        # Override default.conf sa ConfigMap-om — source nginx.conf u FE image-u
        # referencira `banka2_backend` i `banka2_gateway` upstream-e (Docker compose
        # imena) koji ne postoje u K8s. Mountamo svoju verziju sa K8s service imenima.
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: nginx-config
        configMap:
          name: frontend-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: banka-2
spec:
  selector:
    app: frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
