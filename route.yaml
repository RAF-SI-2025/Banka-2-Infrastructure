# HTTPRoute spec limit: max 16 rules per objekat. Splitujemo na 2 objekta.
# Envoy kombiнuje sva pravila iz svih HTTPRoute-a koji imaju isti parentRef + hostname,
# pa global longest-prefix-match radi nezavisno od u kom je HTTPRoute pravilo definisano.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: banka-2-trading
  namespace: banka-2
spec:
  parentRefs:
  - name: banka-gw
    namespace: envoy-gateway-system
  hostnames:
  - banka-2.radenkovic.rs
  rules:
  # 16 path-eva: 15 trading + 1 notification (max limit).
  # URLRewrite skida /api prefix pa backend dobija original path (/orders/new etc).
  - matches: [{path: {type: PathPrefix, value: /api/orders}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /orders}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /api/portfolio}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /portfolio}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /api/tax}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /tax}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /api/funds}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /funds}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /api/actuaries}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /actuaries}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /api/listings}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /listings}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /api/exchanges}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /exchanges}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /api/options}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /options}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /api/margin-accounts}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /margin-accounts}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /api/otc}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /otc}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /api/profit-bank}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /profit-bank}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /api/price-alerts}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /price-alerts}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /api/watchlists}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /watchlists}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /api/recurring-orders}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /recurring-orders}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /api/dividends}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /dividends}}
    backendRefs: [{name: trading-service, port: 8082}]
  # NAPOMENA: /api/notifications NE ide na notification-service! Notification-service
  # je RabbitMQ consumer + Gmail SMTP sender — NEMA HTTP REST endpoint-e. Endpoint-i
  # /notifications/unread-count, /notifications?page=, /notifications/{id}/read zive
  # u banka-core (NotificationController). Catch-all /api → backend (HTTPRoute
  # banka-2-core) ih automatski preuzima.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: banka-2-core
  namespace: banka-2
spec:
  parentRefs:
  - name: banka-gw
    namespace: envoy-gateway-system
  hostnames:
  - banka-2.radenkovic.rs
  rules:
  # Mudrinic alias format /<service>/* — strip prefix pa proxy.
  - matches: [{path: {type: PathPrefix, value: /backend}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /}}
    backendRefs: [{name: backend, port: 8080}]
  - matches: [{path: {type: PathPrefix, value: /trading-service}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /}}
    backendRefs: [{name: trading-service, port: 8082}]
  - matches: [{path: {type: PathPrefix, value: /notification-service}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /}}
    backendRefs: [{name: notification-service, port: 8083}]

  # /admin/dividends specifican (admin pre catch-all /api → backend, jer trading
  # ima /admin/dividends endpoint dok je sve drugo /admin/* na banka-core /employees)
  - matches: [{path: {type: PathPrefix, value: /api/admin/dividends}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /admin/dividends}}
    backendRefs: [{name: trading-service, port: 8082}]

  # Catch-all za sve /api/* sto nije eksplicit trading/notification → backend (banka-core)
  # Pokriva /api/auth, /api/clients, /api/employees, /api/accounts, /api/cards,
  # /api/payments, /api/transfers, /api/loans, /api/savings, /api/audit, /api/assistant,
  # /api/interbank, /api/companies, /api/currencies, /api/actuator, /api/v3, /api/swagger-ui...
  - matches: [{path: {type: PathPrefix, value: /api}}]
    filters:
    - type: URLRewrite
      urlRewrite: {path: {type: ReplacePrefixMatch, replacePrefixMatch: /}}
    backendRefs: [{name: backend, port: 8080}]

  # Inter-bank protokol (profesorov §2/§3) — partner banke (Banka 1, ExBanka 2)
  # zovu BARE putanje na domenu (BEZ /api prefiksa): POST /interbank (2PC),
  # GET /public-stock, /negotiations/**, GET /user/{rn}/{id}. X-Api-Key validira
  # InterbankAuthFilter u banka-core. BEZ rewrite-a — backend sluzi iste putanje.
  # Bez ovih pravila bare putanje padaju na SPA catch-all → partner dobija HTML!
  - matches: [{path: {type: PathPrefix, value: /interbank}}]
    backendRefs: [{name: backend, port: 8080}]
  - matches: [{path: {type: PathPrefix, value: /public-stock}}]
    backendRefs: [{name: backend, port: 8080}]
  - matches: [{path: {type: PathPrefix, value: /negotiations}}]
    backendRefs: [{name: backend, port: 8080}]
  - matches: [{path: {type: PathPrefix, value: /user}}]
    backendRefs: [{name: backend, port: 8080}]

  # SPA catch-all — sve sto nije API path (HTML/CSS/JS/assets + React Router rute)
  - matches: [{path: {type: PathPrefix, value: /}}]
    backendRefs: [{name: frontend, port: 80}]
