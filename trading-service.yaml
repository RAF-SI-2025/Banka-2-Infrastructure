apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-service
  namespace: banka-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-service
  template:
    metadata:
      labels:
        app: trading-service
    spec:
      containers:
      - image: ghcr.io/raf-si-2025/banka-2-trading-service:latest
        imagePullPolicy: Always
        name: banka-2-trading-service
        ports:
        - name: http
          containerPort: 8082
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8082
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8082
          failureThreshold: 30
          periodSeconds: 10
        resources:
          # Trading-service: orderi/portfolio/OTC/fondovi/opcije + InfluxDB klijent.
          # Manji od banka-core jer ima manje JPA repos-a, ali order scheduler
          # i price recorder rade kontinuirano.
          requests:
            cpu: 500m
            memory: 768Mi
          limits:
            cpu: 2000m
            memory: 1536Mi
        env:
          # Trading DB — DRUGA logicka DB unutar istog Crunchy cluster-a 'db'.
          # PostgresCluster ima 2 user-a: 'db' (vlasnik baze 'db') i
          # 'trading-db' (vlasnik baze 'trading-db'). Crunchy operator auto-
          # generise password i izlazi sve u Secret 'db-pguser-trading-db'.
          # Host = 'db-primary.banka-2.svc' (write endpoint Crunchy primary instance).
          - name: TRADING_DB_URL
            value: jdbc:postgresql://db-primary.banka-2.svc:5432/trading-db
          - name: TRADING_DB_USER
            valueFrom:
              secretKeyRef:
                name: db-pguser-trading-db
                key: user
          - name: TRADING_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-pguser-trading-db
                key: password

          # JWT secret — DEV placeholder, production zahteva 256-bit base64 random
          - name: JWT_SECRET
            value: dev-only-jwt-secret-do-not-use-in-prod-rotate-via-env-var-on-each-deploy

          # Inter-service auth (X-Internal-Key) — banka-core ↔ trading-service
          - name: INTERNAL_API_KEY
            value: dev-internal-key-rotate-in-prod

          # Banka-core upstream (internal /internal/portfolio/** poziv ka backend)
          - name: BANKACORE_BASE_URL
            value: http://backend:8080

          # RabbitMQ — async broker (margin/OTC events publish)
          - name: SPRING_RABBITMQ_HOST
            value: rabbitmq
          - name: SPRING_RABBITMQ_PORT
            value: "5672"
          - name: SPRING_RABBITMQ_USERNAME
            value: guest
          - name: SPRING_RABBITMQ_PASSWORD
            value: guest

          # InfluxDB — OHLCV time-series (W1-T6 enabled)
          - name: BANKA2_INFLUX_URL
            value: http://influxdb:8086
          - name: BANKA2_INFLUX_TOKEN
            value: dev-token-change-me-32-bytes-minimum
          - name: BANKA2_INFLUX_ORG
            value: banka2
          - name: BANKA2_INFLUX_BUCKET
            value: tick-listings
          - name: BANKA2_INFLUX_ENABLED
            value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: trading-service
  namespace: banka-2
spec:
  selector:
    app: trading-service
  ports:
  - name: http
    port: 8082
    targetPort: 8082
