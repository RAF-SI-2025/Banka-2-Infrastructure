apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: banka-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - image: ghcr.io/raf-si-2025/banka-2-backend:latest
        imagePullPolicy: Always
        name: banka-2-backend
        ports:
        - name: http
          containerPort: 8080
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          # Spring Boot boot 30-90s sa Hibernate ddl-auto=update + 38 JPA repos.
          # 30 × 10s = 300s grace pre liveness/readiness pocinju da fail-uju.
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          failureThreshold: 30
          periodSeconds: 10
        resources:
          # Banka-core monolit: 38 JPA repos + svi domeni (auth/banking/inter-bank).
          # Boot zahteva ~1Gi RAM, runtime ~1.5Gi pod opterecenjem.
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 2Gi
        env:
          # Primary DB (read-write) — write i DDL idu ovde.
          # USERNAME + PASSWORD iz Crunchy Secret-a `db-pguser-db` (auto-generated od
          # PG operatora). URL host (db-primary) nije sensitive, ostaje plain.
          - name: SPRING_DATASOURCE_URL
            value: jdbc:postgresql://db-primary.banka-2.svc:5432/db
          - name: SPRING_DATASOURCE_USERNAME
            valueFrom:
              secretKeyRef:
                name: db-pguser-db
                key: user
          - name: SPRING_DATASOURCE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-pguser-db
                key: password
          - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
            value: org.postgresql.Driver

          # Read replica (RO) — @Transactional(readOnly=true) ide ovde preko RoutingDataSource.
          # Replica deli isti user/password sa primary (Crunchy streaming replikacija).
          - name: BANKA2_DATASOURCE_REPLICA_URL
            value: jdbc:postgresql://db-replicas.banka-2.svc:5432/db
          - name: BANKA2_DATASOURCE_REPLICA_USERNAME
            valueFrom:
              secretKeyRef:
                name: db-pguser-db
                key: user
          - name: BANKA2_DATASOURCE_REPLICA_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-pguser-db
                key: password
          - name: BANKA2_DATASOURCE_REPLICA_ENABLED
            value: "true"

          # JPA / Hibernate
          - name: SPRING_JPA_HIBERNATE_DDL_AUTO
            value: update
          - name: SPRING_JPA_SHOW_SQL
            value: "false"
          - name: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
            value: org.hibernate.dialect.PostgreSQLDialect
          - name: SPRING_JPA_PROPERTIES_HIBERNATE_TYPE_PREFERRED_BOOLEAN_JDBC_TYPE
            value: INTEGER

          # Rate limit (Bucket4j) — production 10 req/min/IP, demo capacity podigauto
          - name: AUTH_RATE_LIMIT_ENABLED
            value: "true"
          - name: AUTH_RATE_LIMIT_CAPACITY
            value: "100000"

          # Inter-bank (Banka 1 / Tim 1) — X-Api-Key auth, routing 111.
          # PARTNER1_BASE_URL = javni URL gateway-a Banke 1 na NJIHOVOM klasteru.
          # Nas klijent dodaje /interbank, /public-stock, /negotiations, /user na kraj,
          # pa ovo treba da bude baza do koje + ti path-evi stignu do njihovog inbound-a.
          # POPUNITI kad Banka 1 da svoj k8s URL (npr. https://banka-1.<domen>/ ili .../api/
          # zavisno od toga da li njihov ingress koristi /api prefiks). Vidi
          # Banka-1-Integracija/INTEGRACIJA-UPUTSTVO.md §2.
          - name: PARTNER1_BASE_URL
            value: https://REPLACE-WITH-BANKA1-K8S-URL/
          - name: PARTNER1_USER_PATH
            value: /interbank/user/{rn}/{id}
          - name: PARTNER1_ROUTING
            value: "111"
          # Inter-bank handshake tokeni — iz Secret-a `app-secrets`
          # (dogovoreni bilateralno sa Tim 1).
          - name: PARTNER1_INBOUND_TOKEN
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: PARTNER1_INBOUND_TOKEN
          - name: PARTNER1_OUTBOUND_TOKEN
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: PARTNER1_OUTBOUND_TOKEN

          # Particioniranje (transactions/interbank_messages/audit_logs) DISABLE.
          # Hibernate ddl-auto=update kreira obicne tabele, pa PartitionMaintenanceService
          # ne moze `CREATE TABLE ... PARTITION OF` na ne-partitioned parent
          # (SQL grammar error, 12 WARN-ova u logu). Za production: napraviti DB-side
          # migration koja kreira parent sa PARTITION BY RANGE pa enable.
          - name: BANKA2_PARTITIONS_ENABLED
            value: "false"

          # RabbitMQ — async broker za notifikacije
          - name: SPRING_RABBITMQ_HOST
            value: rabbitmq
          - name: SPRING_RABBITMQ_PORT
            value: "5672"
          - name: SPRING_RABBITMQ_USERNAME
            valueFrom:
              secretKeyRef:
                name: rabbitmq-credentials
                key: RABBITMQ_DEFAULT_USER
          - name: SPRING_RABBITMQ_PASSWORD
            valueFrom:
              secretKeyRef:
                name: rabbitmq-credentials
                key: RABBITMQ_DEFAULT_PASS

          # Trading-service (cross-microservice /internal/portfolio/** poziv)
          - name: TRADINGSERVICE_BASE_URL
            value: http://trading-service:8082

          # JWT secret — iz Secret-a `app-secrets` (HS256, 256-bit base64).
          # R3 1564 config-drift fix: banka-core sad FAIL-FAST-uje bez JWT_SECRET
          # (nema vise dev-default-a), pa OVAJ env MORA biti setovan. Mora biti
          # IDENTICAN onome u trading-service.yaml — tokeni koje izda banka-core
          # verifikuju se na trading-service-u. Pre fix-a backend.yaml ga uopste
          # nije setovao → banka-core crash na startu ILI token mismatch.
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: JWT_SECRET

          # Inter-service auth (X-Internal-Key) — banka-core ↔ trading-service.
          # Iz Secret-a `app-secrets` (mora biti identican u trading-service.yaml).
          - name: INTERNAL_API_KEY
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: INTERNAL_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: banka-2
spec:
  selector:
    app: backend
  ports:
  - name: http
    port: 8080
    targetPort: 8080
