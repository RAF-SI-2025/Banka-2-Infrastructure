apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: banka-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - image: ghcr.io/raf-si-2025/banka-2-notification-service:latest
        imagePullPolicy: Always
        name: banka-2-notification-service
        ports:
        - name: http
          containerPort: 8083
        resources:
          # Notification-service: lightweight RabbitMQ consumer + SMTP sender.
          # Nema DB, nema heavy compute — samo email format + SMTP poziv.
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        env:
          # RabbitMQ — async broker (notification-service je konzumer)
          - name: SPRING_RABBITMQ_HOST
            value: rabbitmq
          - name: SPRING_RABBITMQ_PORT
            value: "5672"
          - name: SPRING_RABBITMQ_USERNAME
            valueFrom:
              secretKeyRef:
                name: rabbitmq-credentials
                key: RABBITMQ_DEFAULT_USER
          - name: SPRING_RABBITMQ_PASSWORD
            valueFrom:
              secretKeyRef:
                name: rabbitmq-credentials
                key: RABBITMQ_DEFAULT_PASS

          # Gmail SMTP — username + app password iz Secret-a `mail-credentials`.
          # MAIL_PASSWORD ne sme biti prazan (inace SMTP tiho fail-uje).
          - name: MAIL_USERNAME
            valueFrom:
              secretKeyRef:
                name: mail-credentials
                key: MAIL_USERNAME
          - name: MAIL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mail-credentials
                key: MAIL_PASSWORD
          # P2-config-2 (R3 1596): prod fail-fast — ako je MAIL_PASSWORD prazan
          # (Secret pogresno popunjen), app PUKNE pri startu umesto da tiho DLQ-uje
          # svaku notifikaciju (MailAuthenticationException busy-retry → DLQ).
          - name: NOTIFICATION_MAIL_FAIL_FAST
            value: "true"

          # Deep-link URL base — FE domain za activation/password-reset email link-ove.
          # Placeholder — Mudrinic ce dodeliti pravi FE domain.
          - name: NOTIFICATION_ACTIVATION_URL_BASE
            value: https://banka-2.radenkovic.rs
          - name: NOTIFICATION_PASSWORD_RESET_URL_BASE
            value: https://banka-2.radenkovic.rs
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: banka-2
spec:
  selector:
    app: notification-service
  ports:
  - name: http
    port: 8083
    targetPort: 8083
